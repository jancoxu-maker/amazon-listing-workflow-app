services:
  - type: web
    name: listingflow-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run api
    healthCheckPath: /api/health
    envVars:
      - key: IMAGE_API_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TEXT_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: GENERATED_IMAGE_DIR
        value: generated-images
      - key: EXPORT_DIR
        value: exports
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: 4
      - key: DATABASE_RETRY_ATTEMPTS
        value: 3
      - key: DATABASE_RETRY_BASE_MS
        value: 500
      - key: DATABASE_RETRY_MAX_MS
        value: 5000
      - key: GENERATION_WORKER_RETRY_BASE_MS
        value: 5000
      - key: GENERATION_WORKER_RETRY_MAX_MS
        value: 300000
      - key: REQUIRE_DURABLE_ASSET_STORAGE
        value: true
      - key: ASSET_STORAGE_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_DELIVERY_TYPE
        value: authenticated
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: OBJECT_STORAGE_FORCE_PATH_STYLE
        value: false
